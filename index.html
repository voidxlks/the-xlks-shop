<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XLKS Shop</title>

  <!-- Your blue theme -->
  <link rel="stylesheet" href="blue.css">

  <style>
    header {
      text-align: center;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .top-buttons {
      text-align: center;
      margin-bottom: 20px;
    }

    .top-buttons button {
      margin: 5px;
    }

    .container {
      padding: 20px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .price {
      margin: 10px 0;
      font-size: 18px;
      color: #00cfff;
    }

    .cart-count {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #111;
      padding: 10px 15px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<header>🛒 XLKS Shop</header>

<div class="cart-count">
  Cart: <span id="cart-count">0</span>
</div>

<!-- 🔥 Navigation Buttons -->
<div class="top-buttons">
  <button onclick="location.href='cart.html'">🛒 Cart</button>
  <button onclick="location.href='page2.html'">📄 Info</button>
  <button onclick="location.href='addons/extra-items.html'">✨ Extras</button>
</div>

<div class="container">
  <div class="products" id="products"></div>
</div>

<script>
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  function updateCartUI() {
    document.getElementById("cart-count").innerText = cart.length;
  }

  function addToCart(item) {
    cart.push(item);
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartUI();
    alert(item.name + " added to cart!");
  }

  // 🧠 Load items dynamically (from JSON OR fallback)
  const items = [
    { name: "Starter Item", price: 5, image: "https://via.placeholder.com/200" },
    { name: "Cool Product", price: 10, image: "https://via.placeholder.com/200" },
    { name: "Premium Item", price: 20, image: "https://via.placeholder.com/200" },
    { name: "XLKS Hoodie", price: 35, image: "https://via.placeholder.com/200" },
    { name: "Gaming Mouse", price: 25, image: "https://via.placeholder.com/200" },
    { name: "Mechanical Keyboard", price: 60, image: "https://via.placeholder.com/200" }
  ];

  const container = document.getElementById("products");

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${item.image}">
      <h3>${item.name}</h3>
      <p class="price">$${item.price}</p>
      <button>Add to Cart</button>
    `;

    div.querySelector("button").onclick = () => addToCart(item);

    container.appendChild(div);
  });

  updateCartUI();
</script>

</body>
</html>
